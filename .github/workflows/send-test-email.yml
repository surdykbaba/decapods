name: Send test email

on:
  workflow_dispatch:
    inputs:
      to:
        description: "Recipient address"
        required: true
        default: "surdykbaba@gmail.com"
      subject:
        description: "Subject line"
        required: true
        default: "D'Accubin · Mailgun connectivity test"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Probe origin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 2m
          script: |
            echo "==> Public IP"
            curl -s https://api.ipify.org; echo
            echo
            echo "==> Listening on 80/443"
            ss -tlnp 2>/dev/null | grep -E ':80 |:443 ' || sudo -n ss -tlnp 2>/dev/null | grep -E ':80 |:443 ' || echo "(nothing on 80/443)"
            echo
            echo "==> nginx status"
            sudo -n systemctl is-active nginx && sudo -n systemctl status nginx --no-pager | head -8 || echo "nginx NOT running"
            echo
            echo "==> nginx config test"
            sudo -n nginx -t 2>&1 | head -10 || true
            echo
            echo "==> Firewall (ufw)"
            sudo -n ufw status 2>/dev/null || echo "ufw not installed / inactive"
            echo
            echo "==> Let's Encrypt cert"
            sudo -n ls /etc/letsencrypt/live/ 2>/dev/null || echo "no LE certs"
            echo
            echo "==> nginx server_name & listen lines"
            sudo -n grep -RhnE 'server_name|listen' /etc/nginx/sites-enabled/ 2>/dev/null | head -20 || true
            echo
            echo "==> Local 443 self-test"
            curl -sk -o /dev/null -w "https://localhost/  -> %{http_code}\n" --max-time 5 https://localhost/ || echo "local 443 unreachable"

  send:
    runs-on: ubuntu-latest
    if: ${{ inputs.subject != 'diagnose-only' }}
    steps:
      - name: Send via Mailgun SMTP
        env:
          SMTP_HOST: ${{ secrets.MAILGUN_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.MAILGUN_SMTP_PORT }}
          SMTP_USER: ${{ secrets.MAILGUN_SMTP_USER }}
          SMTP_PASS: ${{ secrets.MAILGUN_SMTP_PASS }}
          SMTP_FROM: ${{ secrets.MAILGUN_FROM }}
          TO_ADDR: ${{ inputs.to }}
          SUBJECT: ${{ inputs.subject }}
        run: |
          python3 - <<'PY'
          import os, smtplib, ssl, sys, datetime
          from email.message import EmailMessage

          host  = os.environ["SMTP_HOST"]
          port  = int(os.environ.get("SMTP_PORT") or "587")
          user  = os.environ["SMTP_USER"]
          pwd   = os.environ["SMTP_PASS"]
          frm   = os.environ.get("SMTP_FROM") or user
          to    = os.environ["TO_ADDR"]
          subj  = os.environ["SUBJECT"]

          ts = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          plain = f"""Hello — this is a connectivity test from the D'Accubin repo.

          Sent from a GitHub Actions runner using the Mailgun SMTP secrets stored on the repo.
          Time: {ts}
          Host: {host}:{port}

          If you received this, the secrets are valid and the pipeline can deliver mail.
          """

          html = f"""<!doctype html>
          <html><body style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#1f2937;line-height:1.5">
            <div style="max-width:560px;margin:24px auto;padding:24px;border:1px solid #e5e7eb;border-radius:14px;background:#faf7f1">
              <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#0f7b97;font-weight:700">Connectivity test</div>
              <h1 style="margin:6px 0 12px;font-size:22px;color:#0f172a">D'Accubin · Mailgun OK ✓</h1>
              <p style="margin:0 0 12px">Hi Sadiq — this is a sample email triggered from a GitHub Actions runner.</p>
              <p style="margin:0 0 12px">It was sent through the <code>MAILGUN_SMTP_*</code> secrets stored on the repo, so receiving this confirms the credentials are valid and the platform can deliver mail.</p>
              <table style="font-size:13px;color:#475569;margin-top:8px">
                <tr><td style="padding:2px 12px 2px 0">Sent at</td><td>{ts}</td></tr>
                <tr><td style="padding:2px 12px 2px 0">SMTP host</td><td>{host}:{port}</td></tr>
                <tr><td style="padding:2px 12px 2px 0">From</td><td>{frm}</td></tr>
              </table>
              <p style="margin-top:18px;font-size:12px;color:#64748b">Triggered by the <code>send-test-email</code> workflow.</p>
            </div>
          </body></html>"""

          msg = EmailMessage()
          msg["Subject"] = subj
          msg["From"]    = frm
          msg["To"]      = to
          msg.set_content(plain)
          msg.add_alternative(html, subtype="html")

          ctx = ssl.create_default_context()
          if port == 465:
            with smtplib.SMTP_SSL(host, port, context=ctx, timeout=30) as s:
              s.login(user, pwd); s.send_message(msg)
          else:
            with smtplib.SMTP(host, port, timeout=30) as s:
              s.ehlo(); s.starttls(context=ctx); s.ehlo()
              s.login(user, pwd); s.send_message(msg)

          print(f"sent → {to} via {host}:{port}", flush=True)
          PY
