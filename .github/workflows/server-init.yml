name: server-init
on:
  workflow_dispatch:
    inputs:
      db_password:
        description: "Postgres password for the pgdp role"
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgres + redis on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASS: ${{ github.event.inputs.db_password }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          envs: DB_PASS
          script_stop: true
          script: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            echo "==> Installing postgres + redis"
            sudo -n apt-get update -y
            sudo -n apt-get install -y postgresql postgresql-contrib redis-server
            sudo -n systemctl enable --now postgresql redis-server
            echo "==> Creating role + database (idempotent)"
            ROLE_EXISTS=$(sudo -n -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='pgdp'")
            if [ "$ROLE_EXISTS" = "1" ]; then
              sudo -n -u postgres psql -c "ALTER ROLE pgdp WITH LOGIN PASSWORD '$DB_PASS';"
            else
              sudo -n -u postgres psql -c "CREATE ROLE pgdp LOGIN PASSWORD '$DB_PASS';"
            fi
            DB_EXISTS=$(sudo -n -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='pgdp'")
            if [ "$DB_EXISTS" != "1" ]; then
              sudo -n -u postgres createdb -O pgdp pgdp
            fi
            sudo -n -u postgres psql -c '\du pgdp'
            redis-cli ping
            echo "==> Done"
