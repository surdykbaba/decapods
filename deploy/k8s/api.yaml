apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pgdp
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/pgdp/api:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - secretRef: { name: api-secrets }
          readinessProbe: { httpGet: { path: /readyz, port: 8080 }, initialDelaySeconds: 5 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 15 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "1",     memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: pgdp }
spec:
  selector: { app: api }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api, namespace: pgdp }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
