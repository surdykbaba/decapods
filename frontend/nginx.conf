server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ { proxy_pass http://api:8080; }
  location /ws   { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }

  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }

  location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
